name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-spec:
    name: lint inaugural SPEC
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint inaugural repo-standup SPEC
        run: bash scripts/lint-spec.sh specs/2026-05-18-repo-standup/SPEC.md

  validate-skills:
    name: validate skill frontmatter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash scripts/validate-skill-frontmatter.sh

  test-hooks:
    name: hook test harness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install jq
        run: sudo apt-get install -y jq
      - name: Run hook tests
        run: bash tests/hooks/run-tests.sh
